name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 001-saihu-replenishment
    tags:
      - 'v*'
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: replenish_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # conftest 按 TEST_DATABASE_URL 决定是否跑 integration tests，
      # 空则全部 skip。必须指向独立 replenish_test 库（名字硬约束）
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/replenish_test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade "pip>=26.0.2"
          pip install -e ".[dev]"
      - name: Run backend unit tests (parallel)
        run: python -m pytest tests/unit -n auto --cov --cov-config=.coveragerc --cov-report= -p no:cacheprovider
      - name: Run backend integration tests (serial, append coverage)
        run: python -m pytest tests/integration --cov --cov-config=.coveragerc --cov-append --cov-report=term-missing -p no:cacheprovider
      - name: Run backend lint
        run: python -m ruff check .
      - name: Run backend type check
        run: python -m mypy app
      - name: Audit backend dependencies
        run: pip-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend lint
        run: npm run lint
      - name: Run frontend build
        run: npm run build
      - name: Run frontend tests with coverage
        run: npm run test:coverage
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build backend image
        run: docker build -t restock-backend:ci-test ./backend
      - name: Build frontend image
        run: docker build -t restock-frontend:ci-test ./frontend

  publish:
    needs: [backend, frontend, docker-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Normalize GHCR owner
        id: ghcr
        shell: bash
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/restock-backend:sha-${{ github.sha }}
            ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && format('ghcr.io/{0}/restock-backend:latest', steps.ghcr.outputs.owner) || '' }}
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/restock-frontend:sha-${{ github.sha }}
            ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && format('ghcr.io/{0}/restock-frontend:latest', steps.ghcr.outputs.owner) || '' }}
