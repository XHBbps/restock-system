name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 001-saihu-replenishment
    tags:
      - 'v*'
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run backend tests with coverage
        run: python -m pytest --cov --cov-config=.coveragerc --cov-report=term-missing -p no:cacheprovider
      - name: Run backend lint
        run: python -m ruff check .
      - name: Run backend type check
        run: python -m mypy app
      - name: Audit backend dependencies
        run: pip-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend build
        run: npm run build
      - name: Run frontend tests with coverage
        run: npm run test:coverage
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t restock-backend:ci-test ./backend
      - name: Build frontend image
        run: docker build -t restock-frontend:ci-test ./frontend

  publish:
    needs: [backend, frontend, docker-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Normalize GHCR owner
        id: ghcr
        shell: bash
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/restock-backend:sha-${{ github.sha }}
            ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && format('ghcr.io/{0}/restock-backend:latest', steps.ghcr.outputs.owner) || '' }}
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/restock-frontend:sha-${{ github.sha }}
            ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && format('ghcr.io/{0}/restock-frontend:latest', steps.ghcr.outputs.owner) || '' }}
