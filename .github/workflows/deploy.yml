name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: true
        default: "main"
  push:
    tags:
      - 'v*'

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  check-ci:
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}
      - name: Verify CI passed for this ref
        uses: actions/github-script@v7
        with:
          script: |
            const ref = '${{ github.event.inputs.ref || github.sha }}';
            const checkRuns = await github.paginate(github.rest.checks.listForRef, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: ref,
              filter: 'latest',
              per_page: 100,
            });

            const ciBackend  = checkRuns.find(c => c.name === 'backend');
            const ciFrontend = checkRuns.find(c => c.name === 'frontend');

            if (!ciBackend || ciBackend.conclusion !== 'success') {
              core.setFailed(`Backend CI has not passed for ref ${ref}`);
            }
            if (!ciFrontend || ciFrontend.conclusion !== 'success') {
              core.setFailed(`Frontend CI has not passed for ref ${ref}`);
            }
            core.info('CI checks passed');

  deploy:
    needs: check-ci
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            REF="${{ github.event.inputs.ref || github.ref_name }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all --tags
            if [[ "$REF" == refs/heads/* ]]; then
              BRANCH="${REF#refs/heads/}"
              git checkout "$BRANCH"
              git pull --ff-only origin "$BRANCH"
            elif [[ "$REF" == refs/tags/* ]]; then
              git checkout --detach "$REF"
            elif git show-ref --verify --quiet "refs/remotes/origin/$REF"; then
              git checkout "$REF"
              git pull --ff-only origin "$REF"
            elif git show-ref --verify --quiet "refs/tags/$REF"; then
              git checkout --detach "refs/tags/$REF"
            else
              git checkout --detach "$REF"
            fi
            export IMAGE_TAG="sha-$(git rev-parse HEAD)"
            bash deploy/scripts/deploy.sh

      - name: Notify deploy result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          echo "Deploy $STATUS for ref $REF"
          if [ -n "${{ secrets.DEPLOY_NOTIFY_WEBHOOK }}" ]; then
            curl -sf -X POST "${{ secrets.DEPLOY_NOTIFY_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"Deploy ${STATUS} | ref: ${REF} | by: ${{ github.actor }} | run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
          fi
