openapi: 3.0.3
info:
  title: Restock System - Suggestion API
  version: 1.0.0
paths:
  /api/suggestions:
    get:
      summary: 建议单列表（含历史）
      security: [{bearer: []}]
      parameters:
        - in: query
          name: status
          schema: {type: string, enum: [draft, partial, pushed, archived, error]}
        - in: query
          name: date_from
          schema: {type: string, format: date}
        - in: query
          name: date_to
          schema: {type: string, format: date}
        - in: query
          name: sku
          description: 按 SKU 关键字模糊匹配
          schema: {type: string}
        - in: query
          name: page
          schema: {type: integer, default: 1}
        - in: query
          name: page_size
          schema: {type: integer, default: 20, maximum: 100}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: {$ref: '#/components/schemas/Suggestion'}
                  total: {type: integer}

  /api/suggestions/current:
    get:
      summary: 当前活跃建议单（draft/partial）
      security: [{bearer: []}]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Suggestion'}
        '404':
          description: 暂无活跃建议单

  /api/suggestions/{id}:
    get:
      summary: 建议单详情（含所有 items）
      security: [{bearer: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Suggestion'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: {$ref: '#/components/schemas/SuggestionItem'}

  /api/suggestions/{id}/items/{item_id}:
    patch:
      summary: 编辑建议条目
      security: [{bearer: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
        - in: path
          name: item_id
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                total_qty: {type: integer, minimum: 0}
                country_breakdown: {type: object, additionalProperties: {type: integer}}
                warehouse_breakdown: {type: object}
                t_purchase: {type: object, additionalProperties: {type: string, format: date}}
                t_ship: {type: object, additionalProperties: {type: string, format: date}}
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SuggestionItem'}
        '400':
          description: 参数非法（如负数）

  /api/suggestions/{id}/push:
    post:
      summary: 推送选中条目至赛狐（创建采购单）
      security: [{bearer: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [item_ids]
              properties:
                item_ids:
                  type: array
                  items: {type: integer}
                  maxItems: 50
      responses:
        '200':
          description: 入队任务
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id: {type: integer}
        '400':
          description: 超过 50 条限制 / 含 push_blocker 条目

  /api/suggestions/{id}/archive:
    post:
      summary: 归档建议单
      security: [{bearer: []}]
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: integer}
      responses:
        '204':
          description: 已归档

components:
  securitySchemes:
    bearer: {type: http, scheme: bearer, bearerFormat: JWT}
  schemas:
    Suggestion:
      type: object
      properties:
        id: {type: integer}
        status: {type: string, enum: [draft, partial, pushed, archived, error]}
        triggered_by: {type: string}
        total_items: {type: integer}
        pushed_items: {type: integer}
        failed_items: {type: integer}
        global_config_snapshot: {type: object}
        created_at: {type: string, format: date-time}
        archived_at: {type: string, format: date-time}
    SuggestionItem:
      type: object
      properties:
        id: {type: integer}
        commodity_sku: {type: string}
        commodity_id: {type: string}
        commodity_name: {type: string, description: 关联 product_listing}
        main_image: {type: string}
        total_qty: {type: integer}
        country_breakdown: {type: object}
        warehouse_breakdown: {type: object}
        t_purchase: {type: object}
        t_ship: {type: object}
        overstock_countries: {type: array, items: {type: string}}
        velocity_snapshot: {type: object}
        sale_days_snapshot: {type: object}
        urgent: {type: boolean}
        push_blocker: {type: string}
        push_status: {type: string, enum: [pending, pushed, push_failed, blocked]}
        saihu_po_number: {type: string}
        push_error: {type: string}
        push_attempt_count: {type: integer}
        pushed_at: {type: string, format: date-time}
