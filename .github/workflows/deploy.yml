name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: true
        default: "master"
  push:
    tags:
      - 'v*'

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  check-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Resolve deploy ref
        id: resolve-ref
        shell: bash
        run: |
          set -euo pipefail
          INPUT_REF="${{ github.event.inputs.ref || github.ref_name }}"
          git fetch --force --prune origin \
            '+refs/heads/*:refs/remotes/origin/*' \
            '+refs/tags/*:refs/tags/*'

          CANDIDATE="$INPUT_REF"
          if [[ "$INPUT_REF" == refs/heads/* ]]; then
            CANDIDATE="origin/${INPUT_REF#refs/heads/}"
          elif [[ "$INPUT_REF" == refs/tags/* ]]; then
            CANDIDATE="$INPUT_REF"
          elif git show-ref --verify --quiet "refs/remotes/origin/$INPUT_REF"; then
            CANDIDATE="origin/$INPUT_REF"
          elif git show-ref --verify --quiet "refs/tags/$INPUT_REF"; then
            CANDIDATE="refs/tags/$INPUT_REF"
          fi

          RESOLVED_SHA="$(git rev-parse --verify "${CANDIDATE}^{commit}")"
          echo "ref=$INPUT_REF" >> "$GITHUB_OUTPUT"
          echo "sha=$RESOLVED_SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved $INPUT_REF to $RESOLVED_SHA"
      - name: Verify CI passed for this ref
        uses: actions/github-script@v9
        env:
          DEPLOY_REF: ${{ steps.resolve-ref.outputs.ref }}
          RESOLVED_SHA: ${{ steps.resolve-ref.outputs.sha }}
        with:
          script: |
            const ref = process.env.RESOLVED_SHA;
            const inputRef = process.env.DEPLOY_REF;
            const checkRuns = await github.paginate(github.rest.checks.listForRef, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: ref,
              filter: 'latest',
              per_page: 100,
            });

            const ciBackend  = checkRuns.find(c => c.name === 'backend');
            const ciFrontend = checkRuns.find(c => c.name === 'frontend');

            if (!ciBackend || ciBackend.conclusion !== 'success') {
              core.setFailed(`Backend CI has not passed for ref ${inputRef} (${ref})`);
            }
            if (!ciFrontend || ciFrontend.conclusion !== 'success') {
              core.setFailed(`Frontend CI has not passed for ref ${inputRef} (${ref})`);
            }
            core.info(`CI checks passed for ${inputRef} (${ref})`);

  deploy:
    needs: check-ci
    runs-on: ubuntu-latest
    # 需在 GitHub Settings → Environments → production 配置 required reviewers，
    # 生产部署（包括 workflow_dispatch 手动触发）在 SSH 前必须人工 approval。
    environment:
      name: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            REF="${{ github.event.inputs.ref || github.ref_name }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --force --prune origin \
              '+refs/heads/*:refs/remotes/origin/*' \
              '+refs/tags/*:refs/tags/*'
            if [ -n "$(git status --porcelain)" ]; then
              git stash push -u -m "pre-deploy-${REF}-$(date -u +%Y%m%d%H%M%S)"
            fi
            if [[ "$REF" == refs/heads/* ]]; then
              BRANCH="${REF#refs/heads/}"
              git checkout -f -B "$BRANCH" "origin/$BRANCH"
            elif [[ "$REF" == refs/tags/* ]]; then
              git checkout -f --detach "$REF"
            elif git show-ref --verify --quiet "refs/remotes/origin/$REF"; then
              git checkout -f -B "$REF" "origin/$REF"
            elif git show-ref --verify --quiet "refs/tags/$REF"; then
              git checkout -f --detach "refs/tags/$REF"
            else
              git checkout -f --detach "$REF"
            fi
            export IMAGE_TAG="sha-$(git rev-parse HEAD)"
            bash deploy/scripts/deploy.sh

      - name: Notify deploy result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          echo "Deploy $STATUS for ref $REF"
          if [ -n "${{ secrets.DEPLOY_NOTIFY_WEBHOOK }}" ]; then
            curl -sf -X POST "${{ secrets.DEPLOY_NOTIFY_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"Deploy ${STATUS} | ref: ${REF} | by: ${{ github.actor }} | run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
          fi
