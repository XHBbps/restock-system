name: restock-dev

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/replenish
  APP_ENV: production
  APP_TIMEZONE: Asia/Shanghai
  APP_LOG_LEVEL: INFO
  APP_BASE_URL: ${APP_BASE_URL}
  SAIHU_BASE_URL: https://openapi.sellfox.com
  SAIHU_CLIENT_ID: ${SAIHU_CLIENT_ID}
  SAIHU_CLIENT_SECRET: ${SAIHU_CLIENT_SECRET}
  LOGIN_PASSWORD: ${LOGIN_PASSWORD}
  JWT_SECRET: ${JWT_SECRET}
  JWT_EXPIRES_HOURS: 24
  EXPORT_STORAGE_DIR: /app/data/exports
  TZ: Asia/Shanghai

x-backend-build: &backend-build
  context: ../backend
  dockerfile: Dockerfile
  args:
    PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
    PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn

x-backend-healthcheck: &backend-healthcheck
  test:
    [
      "CMD",
      "python",
      "-c",
      "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz', timeout=2)",
    ]
  interval: 30s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  db:
    container_name: restock-dev-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: replenish
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "5433:5432"
    volumes:
      - ./data/pg-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d replenish"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal
    logging: *default-logging

  backend:
    container_name: restock-dev-backend
    build: *backend-build
    restart: unless-stopped
    environment:
      <<: *backend-env
      APP_DOCS_ENABLED: ${APP_DOCS_ENABLED:-true}
      PROCESS_ENABLE_WORKER: false
      PROCESS_ENABLE_REAPER: false
      PROCESS_ENABLE_SCHEDULER: false
    volumes:
      - ./data/exports:/app/data/exports
    depends_on:
      db:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    networks:
      - internal
    logging: *default-logging

  worker:
    container_name: restock-dev-worker
    build: *backend-build
    restart: unless-stopped
    environment:
      <<: *backend-env
      APP_DOCS_ENABLED: false
      PROCESS_ENABLE_WORKER: true
      PROCESS_ENABLE_REAPER: true
      PROCESS_ENABLE_SCHEDULER: false
      DB_POOL_SIZE: 3
      DB_MAX_OVERFLOW: 2
    depends_on:
      db:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    networks:
      - internal
    logging: *default-logging

  scheduler:
    container_name: restock-dev-scheduler
    build: *backend-build
    restart: unless-stopped
    environment:
      <<: *backend-env
      APP_DOCS_ENABLED: false
      PROCESS_ENABLE_WORKER: false
      PROCESS_ENABLE_REAPER: true
      PROCESS_ENABLE_SCHEDULER: true
      DB_POOL_SIZE: 3
      DB_MAX_OVERFLOW: 2
    depends_on:
      db:
        condition: service_healthy
    healthcheck: *backend-healthcheck
    networks:
      - internal
    logging: *default-logging

  frontend:
    container_name: restock-dev-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - internal
    logging: *default-logging

  caddy:
    container_name: restock-dev-caddy
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ./data/caddy-dev:/data
      - ./data/caddy-dev-config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - internal
    logging: *default-logging

networks:
  internal:
    driver: bridge
