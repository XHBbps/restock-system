openapi: 3.0.3
info:
  title: Restock System - Auth API
  version: 1.0.0
paths:
  /api/auth/login:
    post:
      summary: 登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer
                    description: 秒
        '401':
          description: 密码错误
        '423':
          description: 账号锁定（连续失败 5 次）
          content:
            application/json:
              schema:
                type: object
                properties:
                  locked_until:
                    type: string
                    format: date-time

  /api/auth/logout:
    post:
      summary: 登出
      security:
        - bearer: []
      responses:
        '204':
          description: 登出成功

  /api/auth/me:
    get:
      summary: 当前会话信息
      security:
        - bearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  expires_at:
                    type: string
                    format: date-time

components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
